name: Setup Playwright Server
description: Start a Playwright server in Docker and configure PW_TEST_CONNECT_* env vars

inputs:
  port:
    description: Port to expose the Playwright server on
    default: "43424"
  version:
    description: Playwright version
    default: "1.58.2"
  container-name:
    description: Docker container name
    default: "playwright"

outputs:
  container-name:
    description: "Docker container name (use with 'docker logs <name>' in a post step with if: always())"
    value: ${{ steps.start.outputs.container-name }}

runs:
  using: composite
  steps:
    - name: Start Playwright server
      id: start
      shell: bash
      run: |
        echo "container-name=${{ inputs.container-name }}" >> $GITHUB_OUTPUT

        docker run -d \
          --name "${{ inputs.container-name }}" \
          -p "127.0.0.1:${{ inputs.port }}:${{ inputs.port }}" \
          --rm --init \
          --workdir /home/pwuser \
          --user pwuser \
          "mcr.microsoft.com/playwright:v${{ inputs.version }}-noble" \
          /bin/sh -c "npx -y playwright@${{ inputs.version }} run-server --port ${{ inputs.port }} --host 0.0.0.0"

        echo "PW_TEST_CONNECT_WS_ENDPOINT=ws://127.0.0.1:${{ inputs.port }}/" >> $GITHUB_ENV
        echo "PW_TEST_CONNECT_EXPOSE_NETWORK=*" >> $GITHUB_ENV

    - name: Wait for Playwright server to be ready
      shell: bash
      run: npx wait-on --timeout 30000 http-get://127.0.0.1:${{ inputs.port }}/
