name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  check-and-unit:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true
          run-install: true

      - name: Run checks
        run: vp run check

      - name: Run unit tests
        run: vp run test

  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true
          run-install: true

      - name: Install Playwright browser
        run: vp exec playwright install --with-deps chromium

      - name: Run end-to-end tests
        run: vp run e2e
