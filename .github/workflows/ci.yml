name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  check-and-unit:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true
          run-install: true

      - name: Run checks
        run: vp run check

      - name: Run unit tests
        run: vp run test

  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true
          run-install: true

      - name: Install Playwright browser
        run: vp exec playwright install --with-deps chromium

      - name: Run end-to-end tests
        run: vp run e2e

      - name: Publish storyboard to object storage
        uses: ./.github/actions/publish-storyboard
        if: always() && hashFiles('apps/viewer/storyboards/**/*') != ''
        with:
          storyboard-dir: apps/viewer/storyboards
          publish-path: ${{ github.repository }}/${{ github.ref_name }}/viewer-storyboards
          secret-access-key: ${{ secrets.RCLONE_CONFIG_PUBLISH_SECRET_ACCESS_KEY }}

  e2e-example:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true
          run-install: true

      - name: Build packages
        run: vp run visual-storyboard#build

      - name: Install Playwright browser
        working-directory: apps/example
        run: vp exec playwright install --with-deps chromium

      - name: Run Swag Labs example tests
        working-directory: apps/example
        run: vp exec playwright test

      - name: Publish storyboard to object storage
        uses: ./.github/actions/publish-storyboard
        if: always() && hashFiles('apps/example/public/storyboards/**/*') != ''
        with:
          storyboard-dir: apps/example/public/storyboards
          publish-path: ${{ github.repository }}/${{ github.ref_name }}/storyboards
          secret-access-key: ${{ secrets.RCLONE_CONFIG_PUBLISH_SECRET_ACCESS_KEY }}
